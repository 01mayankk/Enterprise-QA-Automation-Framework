name: QA Regression Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Execution Environment"
        required: true
        default: "qa"
        type: choice
        options:
          - development
          - qa
          - production
      browser:
        description: "Target Test Browser"
        required: true
        default: "chrome"
        type: choice
        options:
          - chrome
          - firefox
      headless:
        description: "Run Browser Headlessly"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      retry_count:
        description: "Test Retry Limit"
        required: true
        default: "2"
        type: string

jobs:
  test:
    name: Run Headless Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Work Directories
        run: |
          mkdir -p logs reports screenshots

      - name: Run Test Suite
        env:
          TEST_ENV: ${{ github.event.inputs.environment || 'qa' }}
          RETRY_COUNT: ${{ github.event.inputs.retry_count || '2' }}
        run: |
          # Resolve browser override
          BROWSER_VAL="${{ github.event.inputs.browser || 'chrome' }}"
          
          # Resolve headless toggle
          HEADLESS_VAL="${{ github.event.inputs.headless || 'true' }}"
          HEADLESS_FLAG=""
          if [ "$HEADLESS_VAL" = "true" ]; then
            HEADLESS_FLAG="--headless"
          fi
          
          # Run tests with dynamic environment inputs
          python -m pytest -v --browser "$BROWSER_VAL" $HEADLESS_FLAG --html=reports/report.html --self-contained-html

      - name: Upload Test HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: execution-report
          path: reports/

      - name: Upload Failure Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-screenshots
          path: screenshots/
